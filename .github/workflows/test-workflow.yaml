name: Test Multilspy

on:
  push:
    branches: [main, feat/*]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
      fail-fast: false

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: "pip"

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Install gopls
      run: go install golang.org/x/tools/gopls@latest

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.4'

    - name: Install Solargraph
      run: gem install solargraph

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Remove problematic JDK installations
      run: |
        sudo rm -rf /usr/lib/jvm/temurin-8-jdk-amd64 || true
        sudo rm -rf /usr/lib/jvm/adoptopenjdk-8-hotspot-amd64 || true

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Fix Gradle and Maven permissions
      run: |
        # The KLS resolves classpath by invoking gradle/mvn directly.
        # On GitHub runners these may lack execute permission for non-owners.
        sudo chmod a+x /usr/bin/gradle /usr/bin/mvn || true
        # Verify they're actually runnable
        gradle --version || echo "WARNING: gradle not runnable"
        mvn --version || echo "WARNING: mvn not runnable"

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e .

    - name: Run tests
      run: pytest tests/multilspy -v --tb=short
