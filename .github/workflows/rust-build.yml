name: Rust Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: clippy

      - name: Build
        run: |
          cd rust
          cargo build --release -p multilspy-cli

      - name: Run CLI help
        run: |
          cd rust
          ./target/release/ra-lsp -h
